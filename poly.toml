# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[discovery]
exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "dist/**",
]

[per-file-ignores]
"tests/**" = [
    "ANN",
    "D",
    "PERF401",
    "PERF402",
    "PLC0415",
    "PLR2004",
    "S101",
    "S105",
    "S106",
    "S108",
    "SLF001",
    "TC001",
    "TC003",
]

[lint.python.ruff]
line_length = 120
select = ["ALL"]
ignore = ["ANN401", "COM812", "D100", "D104", "D107", "D203", "D213", "ISC001", "PLR0913"]

[hooks]
stages = ["pre-commit"]

[hooks.builtin]
polylint = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "dist/**",
] }
polyfmt = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "dist/**",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "dist/**",
] }

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.pyrefly]
enabled = true
# TODO exclude: regex not auto-convertible to glob: ^(examples|tests|benchmarks|e2e)/

[tools.actionlint]
enabled = true

# --- lightweight inline script hooks (no toolchain) ---
[hooks.pre-commit.scripts.ai_rulez_generate]
# TODO: wire to vendored script / task target (was a shared pre-commit-hooks hook).
run = "TODO-ai-rulez-generate"

[hooks.pre-commit.scripts.gh_actions_updater]
# TODO: wire to vendored script / task target (was a shared pre-commit-hooks hook).
run = "TODO-gh-actions-updater"
