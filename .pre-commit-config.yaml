default_install_hook_types:
- pre-commit
- commit-msg
default_stages:
- pre-commit
exclude: ^dist/
repos:
- repo: https://github.com/Goldziher/gitfluff
  rev: v0.8.0
  hooks:
  - id: gitfluff-lint
    args:
    - --write
    stages:
    - commit-msg
- repo: https://github.com/xberg-io/pre-commit-hooks
  rev: v1.2.3
  hooks:
  - id: ai-rulez-generate
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-merge-conflict
  - id: check-added-large-files
  - id: detect-private-key
  - id: check-json
  - id: check-yaml
  - id: check-toml
  - id: check-case-conflict
  - id: pyproject-fmt
  - id: ruff
  - id: ruff-format
  - id: mypy
    args:
    - --strict
    - src
    exclude: ^(examples|tests|benchmarks|e2e)/
  - id: oxfmt
  - id: rumdl-fmt
  - id: actionlint
  - id: gh-actions-updater
  - id: typos
    args:
    - --force-exclude
